<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Tabla de Usuarios</title>
</h:head>
<h:body>
    <h:form>
        <p:dataTable value="#{tableController.usuarios}" var="usuario" bordered="true">
            <p:column headerText="ID">
                #{usuario.id}
            </p:column>
            <p:column headerText="Nombre">
                #{usuario.nombre}
            </p:column>
            <p:column headerText="Correo">
                #{usuario.correo}
            </p:column>
        </p:dataTable>

        <p:button value="Volver" outcome="home.xhtml" icon="pi pi-arrow-left" />
    </h:form>
</h:body>
</html>
